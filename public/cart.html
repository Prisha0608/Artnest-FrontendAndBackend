<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="cart.css">

</head>

<body>

<nav>
<h1><i class="fas fa-palette"></i> ArtNest</h1>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<ul id="menu">
<li><a href="h.html"><i class="fas fa-home"></i> Home</a></li>
<li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
<li><a href="gallery.html"><i class="fas fa-images"></i> Gallery</a></li>
<li><a href="letstalk.html"><i class="fas fa-envelope"></i> Contact</a></li>

<button type="button" onclick="goToCart()" class="cart-page-btn">
🛒 Cart 
</button>
</ul>
</nav>


<div class="page-content">
<h1>Your Cart</h1>
<div id="cart-items"></div>
</div>


<div class="cart-summary" id="cart-summary">

<h2>Total: ₹<span id="total-price">0</span></h2>

<div class="payment-methods">
<p><strong>Choose Payment Method:</strong></p>

<div class="payment-buttons">
<button class="payment-option"><i class="fas fa-mobile-alt"></i> UPI</button>
<button class="payment-option"><i class="fas fa-credit-card"></i> Card</button>
<button class="payment-option"><i class="fab fa-paypal"></i> PayPal</button>
<button class="payment-option"><i class="fas fa-money-bill-wave"></i> Cash</button>
</div>

</div>

<div class="cart-actions">

<button class="clear-btn" type="button" onclick="clearCart()">🗑️ Clear Cart</button>

<button class="payment-btn" type="button" onclick="proceedToPayment()">💳 Proceed to Payment</button>

</div>

</div>









<script>

function loadCart(){

fetch("http://localhost:3000/cart")
.then(res=>res.json())
.then(cart=>{

const container = document.getElementById("cart-items")
const totalElem = document.getElementById("total-price")

const summary = document.getElementById("cart-summary")

container.innerHTML = ""

let total = 0



if(cart.length === 0){

container.innerHTML = `
<div style="text-align:center;padding:40px">
<h2>🛒 Your cart is empty</h2>
<p>Go to gallery and add some art</p>
</div>
`

summary.style.display="none"
totalElem.innerText=0
return
}

summary.style.display="block"

cart.forEach((item,index)=>{

total += Number(item.price)

const card=document.createElement("div")
card.className="cart-item"

card.innerHTML=`
<img src="${item.img}" loading="lazy">

<div class="item-info">
<h3>${item.name}</h3>
<p>₹${item.price}</p>
</div>

<button class="remove-btn" onclick="removeItem(${index})">
Remove
</button>
`

container.appendChild(card)

})

totalElem.innerText=total

})

}

function removeItem(index){

fetch("http://localhost:3000/cart/remove-from-cart/"+index,{
method:"DELETE"
})
.then(()=>loadCart())

}

function clearCart(){

fetch("http://localhost:3000/cart/clear-cart",{
method:"DELETE"
})
.then(()=>loadCart())

}

function proceedToPayment(){
alert("Payment system coming soon 💳")
}

window.onload = loadCart

</script>

</body>
</html>
