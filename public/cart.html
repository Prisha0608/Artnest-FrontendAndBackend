<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
  overflow-y: auto; /* ensures vertical scroll */
}


    /* ===== Navbar ===== */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, #cfe698, #286743);
      padding: 15px 30px;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav h1 {
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      align-items: center;
      transition: max-height 0.4s ease;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: #f5e3b2;
    }

    .menu-toggle {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
    }

    .cart-page-btn {
      background: #f5e3b2;
      border: none;
      border-radius: 30px;
      padding: 8px 20px;
      cursor: pointer;
      font-weight: 500;
      color: #286743;
      transition: 0.3s;
    }

    .cart-page-btn:hover {
      background: white;
    }

    /* ===== Cart Items ===== */
    h1 {
      text-align: center;
      color: #286743;
      margin: 25px 0;
    }

    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      flex-wrap: wrap;
      gap: 10px;
    }

    .cart-item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    .item-info {
      flex: 1;
      min-width: 200px;
    }

    .item-info h3 {
      margin-bottom: 5px;
      color: #286743;
      font-size: 1.1rem;
    }

    .item-info p {
      margin: 0;
      font-weight: bold;
      color: #333;
    }

    .remove-btn {
      background: #d9534f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .remove-btn:hover {
      background: #c9302c;
    }

    /* ===== Cart Summary (Fixed at Bottom) ===== */
    .cart-summary {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-top: 2px solid #286743;
      text-align: center;
      padding: 15px 15px 25px;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
      display: none;
      z-index: 100;
    }

    .cart-summary h2 {
      color: #286743;
      margin-bottom: 10px;
      font-size: 1.3rem;
    }

    .clear-btn {
      background: #999;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .clear-btn:hover {
      background: #666;
    }

    .page-content {
      padding: 20px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      nav {
        flex-wrap: wrap;
      }

      .menu-toggle {
        display: block;
      }

      nav ul {
        flex-direction: column;
        max-height: 0;
        overflow: hidden;
        width: 100%;
        background: #286743;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }

      nav ul.show {
        max-height: 300px;
      }

      nav ul li,
      nav button {
        margin: 10px 0;
      }

      .cart-item {
        flex-direction: column;
        text-align: center;
      }

      .cart-item img {
        margin-bottom: 10px;
      }

      .remove-btn {
        width: 100%;
      }
    }

    .cart-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .payment-btn {
      background: #286743;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s;
    }

    .payment-btn:hover {
      background: #1e4d33;
    }

    /* ===== Payment Methods Styling ===== */
    .payment-methods {
      margin-bottom: 15px;
      font-size: 0.95rem;
      color: #333;
    }

    .payment-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .payment-option {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #286743;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s, transform 0.2s;
    }

    .payment-option i {
      font-size: 1.2rem;
    }

    .payment-option:hover {
      background: #1e4d33;
      transform: scale(1.05);
    }

    .page-content {
  padding: 20px;
  padding-bottom: 150px; /* Add this to allow space for fixed footer */
}


    @media (max-width: 480px) {
      nav h1 {
        font-size: 1.3rem;
      }
      .cart-summary h2 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <nav>
    <h1><i class="fas fa-palette"></i> ArtNest</h1>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <ul id="menu">
      <li><a href="h.html"><i class="fas fa-home"></i> Home</a></li>
      <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
      <li><a href="Gallery.html"><i class="fas fa-images"></i> Gallery</a></li>
      <li><a href="letstalk.html"><i class="fas fa-envelope"></i> Contact</a></li>
      <button onclick="goToCart()" class="cart-page-btn">🛒 View Cart</button>
    </ul>
  </nav>

  <div class="page-content">
    <h1>Your Cart</h1>
    <div id="cart-items"></div>
  </div>

  <div class="cart-summary" id="cart-summary">
    <h2>Total: ₹<span id="total-price">0</span></h2>

    <div class="payment-methods">
      <p><strong>Choose Payment Method:</strong></p>
      <div class="payment-buttons">
        <button class="payment-option"><i class="fas fa-mobile-alt"></i> UPI</button>
        <button class="payment-option"><i class="fas fa-credit-card"></i> Card</button>
        <button class="payment-option"><i class="fab fa-paypal"></i> PayPal</button>
        <button class="payment-option"><i class="fas fa-money-bill-wave"></i> Cash</button>
      </div>
    </div>

    <div class="cart-actions">
      <button class="clear-btn" onclick="clearCart()">🗑️ Clear Cart</button>
      <button class="payment-btn" onclick="proceedToPayment()">💳 Proceed to Payment</button>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("show");
    }

    function loadCart() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const container = document.getElementById("cart-items");
      const summary = document.getElementById("cart-summary");
      const totalPriceElem = document.getElementById("total-price");

      container.innerHTML = "";
      let total = 0;

      if (cart.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>Your cart is empty!</p>";
        summary.style.display = "none";
        return;
      }

      cart.forEach((item, index) => {
        total += item.price;

        const div = document.createElement("div");
        div.classList.add("cart-item");
        div.innerHTML = `
          <img src="${item.img}" alt="${item.name}">
          <div class="item-info">
            <h3>${item.name}</h3>
            <p>₹${item.price}</p>
          </div>
          <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
        `;
        container.appendChild(div);
      });

      totalPriceElem.textContent = total;
      summary.style.display = "block";
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    function clearCart() {
      localStorage.removeItem("cart");
      loadCart();
    }

    function goToCart() {
      window.location.href = "cart.html";
    }

    function proceedToPayment() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }

      alert("Redirecting to payment gateway...");
      window.location.href = "payment.html"; // simulate redirect
    }

    loadCart();
  </script>
</body>
</html>
